<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <title>sandbox</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
      .react-dropdown-select {
        display: flex; align-items: center; position: relative;
        width: 400px; min-height: 36px;
        border: 1px solid #ccc; border-radius: 2px;
        padding: 2px 5px; cursor: pointer; background: #fff; color: #0074D9;
      }
      .react-dropdown-select-content { flex: 1; display: flex; align-items: center; }
      .react-dropdown-select-input {
        border: none; outline: none; font-size: 14px; background: transparent; width: auto;
        font-family: Roboto, Helvetica, Arial, sans-serif;
      }
      .react-dropdown-select-input::placeholder { color: #ccc; }
      .react-dropdown-select-clear { cursor: pointer; padding: 0 5px; font-size: 18px; color: #999; display: flex; align-items: center; }
      .react-dropdown-select-dropdown-handle { cursor: pointer; display: flex; align-items: center; padding: 0 5px; }
      .react-dropdown-select-dropdown-handle svg { width: 16px; height: 16px; fill: #999; }
      .react-dropdown-select-dropdown {
        position: absolute; top: 100%; left: 0; right: 0;
        background: #fff; border: 1px solid #ccc; border-top: none;
        max-height: 300px; overflow-y: auto; z-index: 100; display: none;
      }
      .react-dropdown-select.open .react-dropdown-select-dropdown { display: block; }
      .react-dropdown-select-item { padding: 8px 10px; cursor: pointer; font-size: 14px; }
      .react-dropdown-select-item:hover { background: #f0f0f0; }
      .dropdown-section { margin-top: 20px; }
    </style>
</head>
<body>
  <div id="root">
    <div class="jss1">
      <header class="MuiPaper-root MuiAppBar-root MuiAppBar-positionStatic MuiAppBar-colorDefault MuiPaper-elevation4">
        <div class="MuiToolbar-root MuiToolbar-regular MuiToolbar-gutters">
          <button class="MuiButtonBase-root MuiIconButton-root jss3 MuiIconButton-colorInherit" type="button" aria-label="Menu"><span class="MuiIconButton-label"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg></span><span class="MuiTouchRipple-root"></span></button>
          <a class="MuiButtonBase-root MuiButton-root MuiButton-text jss4 MuiButton-colorInherit" href="/"><span class="MuiButton-label"><svg width="111" height="32" viewBox="0 0 111 32" class="d-inline-block align-top" role="img" aria-label="sandbox logo"><rect width="32" height="32" rx="4" fill="#6366f1"/><text x="6" y="23" font-size="18" font-weight="700" fill="#fff" font-family="Roboto, sans-serif">S</text><text x="40" y="22" font-size="16" font-weight="500" fill="rgba(0,0,0,0.87)" font-family="Roboto, sans-serif">sandbox</text></svg></span><span class="MuiTouchRipple-root"></span></a>
          <h6 class="MuiTypography-root jss5 MuiTypography-h6">sandbox</h6>
          <div class="jss2"></div>
          <div class="jss6"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Training: This is a mock feature.')"><span class="MuiButton-label">training</span><span class="MuiTouchRipple-root"></span></button></div>
          <div class="jss7"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Examples: This is a mock feature.')"><span class="MuiButton-label">examples</span><span class="MuiTouchRipple-root"></span></button></div>
          <div class="jss8"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Help: This is a mock feature.')"><span class="MuiButton-label">help</span><span class="MuiTouchRipple-root"></span></button></div>
          <label class="MuiFormControlLabel-root jss9"><span class="MuiSwitch-root"><span class="MuiButtonBase-root MuiIconButton-root jss10 MuiSwitch-switchBase"><span class="MuiIconButton-label"><input class="jss13 MuiSwitch-input" type="checkbox" value=""><span class="MuiSwitch-thumb"></span></span><span class="MuiTouchRipple-root"></span></span><span class="MuiSwitch-track"></span></span><span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79-4-4 4-1.79 4-4z"></path></svg></span></label>
        </div>
      </header>
    </div>

    <div class="page-content">
      <div class="MuiGrid-root MuiGrid-container">
        <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
          <h3 class="MuiTypography-root MuiTypography-h3">Dropdown examples</h3>
        </div>

        <div class="MuiGrid-root dropdown-section MuiGrid-item MuiGrid-grid-xs-4">
          <h6 class="MuiTypography-root MuiTypography-h6">React select</h6>
          <div>
            <div tabindex="0" class="react-dropdown-select" id="react-select" direction="ltr" color="#0074D9">
              <div class="react-dropdown-select-content react-dropdown-select-type-single">
                <input tabindex="-1" class="react-dropdown-select-input" size="9" placeholder="Select..." value="" readonly>
              </div>
              <div class="react-dropdown-select-clear" tabindex="-1">×</div>
              <div tabindex="-1" class="react-dropdown-select-dropdown-handle">
                <svg fill="currentColor" viewBox="0 0 40 40"><path d="M31 26.4q0 .3-.2.5l-1.1 1.2q-.3.2-.6.2t-.5-.2l-8.7-8.8-8.8 8.8q-.2.2-.5.2t-.5-.2l-1.2-1.2q-.2-.2-.2-.5t.2-.5l10.4-10.4q.3-.2.6-.2t.5.2l10.4 10.4q.2.2.2.5z"></path></svg>
              </div>
              <div class="react-dropdown-select-dropdown">
                <div class="react-dropdown-select-item" data-value="apple">Apple</div>
                <div class="react-dropdown-select-item" data-value="banana">Banana</div>
                <div class="react-dropdown-select-item" data-value="cherry">Cherry</div>
                <div class="react-dropdown-select-item" data-value="grape">Grape</div>
                <div class="react-dropdown-select-item" data-value="mango">Mango</div>
                <div class="react-dropdown-select-item" data-value="orange">Orange</div>
              </div>
            </div>
          </div>
        </div>

        <div class="MuiGrid-root dropdown-section MuiGrid-item MuiGrid-grid-xs-12">
          <h6 class="MuiTypography-root MuiTypography-h6">Simple select</h6>
          <label for="day-select">Choose a day:</label>
          <div>
            <select id="day">
              <option value=""> Please choose a day</option>
              <option value="Sunday">Sunday</option>
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
              <option value="Saturday">Saturday</option>
            </select>
          </div>
        </div>

        <div class="MuiGrid-root dropdown-section MuiGrid-item MuiGrid-grid-xs-12">
          <h6 class="MuiTypography-root MuiTypography-h6">Select with option groups</h6>
          <label for="kitty-select">Choose a kitty:</label>
          <div>
            <select name="kitties" id="kitty-select">
              <optgroup label="Domestic">
                <option value="birman">Birman</option>
                <option value="bengal">Bengal</option>
                <option value="balinese">Balinese</option>
                <option value="cymric">Cymric</option>
                <option value="cornishrex">Cornish Rex</option>
                <option value="havana">Havana</option>
              </optgroup>
              <optgroup label="Big Cats">
                <option value="tiger">Tiger</option>
                <option value="lion">Lion</option>
                <option value="jaguar">Jaguar</option>
                <option value="leopard">Leopard</option>
              </optgroup>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const select = document.getElementById('react-select');
    const input = select.querySelector('.react-dropdown-select-input');
    const clearBtn = select.querySelector('.react-dropdown-select-clear');

    select.addEventListener('click', function(e) {
      if (e.target === clearBtn || clearBtn.contains(e.target)) {
        input.value = '';
        input.placeholder = 'Select...';
        select.classList.remove('open');
        return;
      }
      select.classList.toggle('open');
    });

    select.querySelector('.react-dropdown-select-dropdown').querySelectorAll('.react-dropdown-select-item').forEach(item => {
      item.addEventListener('click', function() {
        input.value = this.textContent;
        input.placeholder = '';
        select.classList.remove('open');
      });
    });

    document.addEventListener('click', function(e) {
      if (!select.contains(e.target)) select.classList.remove('open');
    });
  </script>
</body>
</html>
