          <label class="MuiFormControlLabel-root jss9"><span class="MuiSwitch-root"><span class="MuiButtonBase-root MuiIconButton-root jss10 MuiSwitch-switchBase"><span class="MuiIconButton-label"><input class="jss13 MuiSwitch-input" type="checkbox" value=""><span class="MuiSwitch-thumb"></span></span><span class="MuiTouchRipple-root"></span></span><span class="MuiSwitch-track"></span></span><span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79-4-4 4-1.79 4-4z"></path></svg></span></label>
        </div>

    </div>
    <div class="page-content">
      <div class="MuiGrid-root MuiGrid-container">
        <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
          <h3 class="MuiTypography-root MuiTypography-h3">radio button examples</h3>
        </div>
        <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-4">
          <form action="#">
            <div class="MuiFormGroup-root" role="radiogroup" aria-label="selection" margin="normal">
              <label class="MuiFormControlLabel-root">
                <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiRadio-root MuiRadio-colorSecondary jss11 Mui-checked MuiIconButton-colorSecondary" aria-disabled="false">
                  <span class="MuiIconButton-label"><input class="jss13" name="selection" type="radio" value="jerry" checked>
                    <div class="jss15 jss17"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"></path></svg><svg class="MuiSvgIcon-root jss16" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.465 8.465C9.37 7.56 10.62 7 12 7C14.76 7 17 9.24 17 12C17 13.38 16.44 14.63 15.535 15.535C14.63 16.44 13.38 17 12 17C9.24 17 7 14.76 7 12C7 10.62 7.56 9.37 8.465 8.465Z"></path></svg></div>
                  </span><span class="MuiTouchRipple-root"></span>
                </span>
                <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">jerry seinfeld</span>
              </label>
              <label class="MuiFormControlLabel-root">
                <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiRadio-root MuiRadio-colorSecondary MuiIconButton-colorSecondary" aria-disabled="false">
                  <span class="MuiIconButton-label"><input class="jss13" name="selection" type="radio" value="george">
                    <div class="jss15"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"></path></svg><svg class="MuiSvgIcon-root jss16" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.465 8.465C9.37 7.56 10.62 7 12 7C14.76 7 17 9.24 17 12C17 13.38 16.44 14.63 15.535 15.535C14.63 16.44 13.38 17 12 17C9.24 17 7 14.76 7 12C7 10.62 7.56 9.37 8.465 8.465Z"></path></svg></div>
                  </span><span class="MuiTouchRipple-root"></span>
                </span>
                <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">george costanza</span>
              </label>
              <label class="MuiFormControlLabel-root">
                <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiRadio-root MuiRadio-colorSecondary MuiIconButton-colorSecondary" aria-disabled="false">
                  <span class="MuiIconButton-label"><input class="jss13" name="selection" type="radio" value="elaine">
                    <div class="jss15"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"></path></svg><svg class="MuiSvgIcon-root jss16" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.465 8.465C9.37 7.56 10.62 7 12 7C14.76 7 17 9.24 17 12C17 13.38 16.44 14.63 15.535 15.535C14.63 16.44 13.38 17 12 17C9.24 17 7 14.76 7 12C7 10.62 7.56 9.37 8.465 8.465Z"></path></svg></div>
                  </span><span class="MuiTouchRipple-root"></span>
                </span>
                <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">elaine benes</span>
              </label>
              <label class="MuiFormControlLabel-root">
                <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiRadio-root MuiRadio-colorSecondary MuiIconButton-colorSecondary" aria-disabled="false">
                  <span class="MuiIconButton-label"><input class="jss13" name="selection" type="radio" value="cosmo">
                    <div class="jss15"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"></path></svg><svg class="MuiSvgIcon-root jss16" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.465 8.465C9.37 7.56 10.62 7 12 7C14.76 7 17 9.24 17 12C17 13.38 16.44 14.63 15.535 15.535C14.63 16.44 13.38 17 12 17C9.24 17 7 14.76 7 12C7 10.62 7.56 9.37 8.465 8.465Z"></path></svg></div>
                  </span><span class="MuiTouchRipple-root"></span>
                </span>
                <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">cosmo kramer</span>
              </label>
            </div>
            <button class="MuiButtonBase-root MuiButton-root MuiButton-outlined spaced" tabindex="0" type="submit">
              <span class="MuiButton-label">submit</span><span class="MuiTouchRipple-root"></span>
            </button>
          </form>
          <div>
            <h6 class="MuiTypography-root spaced MuiTypography-h6" id="radio-selection">selection: jerry seinfeld</h6>
            <button class="MuiButtonBase-root MuiButton-root MuiButton-outlined" tabindex="0" type="button" id="use-default-btn">
              <span class="MuiButton-label">use default</span><span class="MuiTouchRipple-root"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    var labels = {jerry:'jerry seinfeld',george:'george costanza',elaine:'elaine benes',cosmo:'cosmo kramer'};

    function selectRadio(value) {
      var input = document.querySelector('input[name="selection"][value="' + value + '"]');
      if (!input) return;
      input.checked = true;
      document.getElementById('radio-selection').textContent = 'selection: ' + labels[value];
      // Update visual state - clear all
      document.querySelectorAll('.MuiRadio-root').forEach(function(el) { el.classList.remove('Mui-checked','jss11'); });
      document.querySelectorAll('.MuiIconButton-label .jss15').forEach(function(el) { el.classList.remove('jss17'); });
      // Set selected
      var radioRoot = input.closest('.MuiRadio-root');
      radioRoot.classList.add('Mui-checked','jss11');
      var wrapper = radioRoot.querySelector('.jss15');
      if (wrapper) wrapper.classList.add('jss17');
    }

    document.querySelectorAll('input[name="selection"]').forEach(function(r) {
      r.addEventListener('change', function() { selectRadio(this.value); });
    });

    document.getElementById('use-default-btn').addEventListener('click', function() { selectRadio('jerry'); });

    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Submitted: ' + document.querySelector('input[name="selection"]:checked').value);
    });
  </script>
</body>
</html>
