<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://maxcdn.bootstrapcdn.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="root">
    <div class="jss1">
      <header class="MuiPaper-root MuiAppBar-root MuiAppBar-positionStatic MuiAppBar-colorDefault MuiPaper-elevation4">
        <div class="MuiToolbar-root MuiToolbar-regular MuiToolbar-gutters">
          <button class="MuiButtonBase-root MuiIconButton-root jss3 MuiIconButton-colorInherit" type="button" aria-label="Menu"><span class="MuiIconButton-label"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg></span><span class="MuiTouchRipple-root"></span></button>
          <a class="MuiButtonBase-root MuiButton-root MuiButton-text jss4 MuiButton-colorInherit" href="/"><span class="MuiButton-label"><svg width="111" height="32" viewBox="0 0 111 32" class="d-inline-block align-top" role="img" aria-label="sandbox logo"><rect width="32" height="32" rx="4" fill="#6366f1"/><text x="6" y="23" font-size="18" font-weight="700" fill="#fff" font-family="Roboto, sans-serif">S</text><text x="40" y="22" font-size="16" font-weight="500" fill="rgba(0,0,0,0.87)" font-family="Roboto, sans-serif">sandbox</text></svg></span><span class="MuiTouchRipple-root"></span></a>
          <h6 class="MuiTypography-root jss5 MuiTypography-h6">sandbox</h6>
          <div class="jss2"></div>
          <div class="jss6"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Training: This is a mock feature.')"><span class="MuiButton-label">training</span><span class="MuiTouchRipple-root"></span></button></div>
          <div class="jss7"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Examples: This is a mock feature.')"><span class="MuiButton-label">examples</span><span class="MuiTouchRipple-root"></span></button></div>
          <div class="jss8"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Help: This is a mock feature.')"><span class="MuiButton-label">help</span><span class="MuiTouchRipple-root"></span></button></div>
          <label class="MuiFormControlLabel-root jss9"><span class="MuiSwitch-root"><span class="MuiButtonBase-root MuiIconButton-root jss10 MuiSwitch-switchBase"><span class="MuiIconButton-label"><input class="jss13 MuiSwitch-input" type="checkbox" value=""><span class="MuiSwitch-thumb"></span></span><span class="MuiTouchRipple-root"></span></span><span class="MuiSwitch-track"></span></span><span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79-4-4 4-1.79 4-4z"></path></svg></span></label>
        </div>
      </header>
    </div>
    <div class="page-content">
      <div class="MuiGrid-root MuiGrid-container">
        <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
          <h3 class="MuiTypography-root MuiTypography-h3">mailbox email example</h3>
          <a target="_blank" rel="noopener noreferrer" href="#">mailbox docs</a>
        </div>
        <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-4">
          <form action="#">
            <div>
              <div class="MuiFormControl-root MuiTextField-root MuiFormControl-marginNormal MuiFormControl-fullWidth">
                <label class="MuiFormLabel-root MuiInputLabel-root MuiInputLabel-formControl MuiInputLabel-animated MuiInputLabel-shrink" data-shrink="true">to address</label>
                <div class="MuiInputBase-root MuiInput-root MuiInput-underline MuiInputBase-fullWidth MuiInput-fullWidth MuiInputBase-formControl MuiInput-formControl">
                  <input aria-invalid="false" name="to" type="text" class="MuiInputBase-input MuiInput-input" value="">
                </div>
                <p class="MuiFormHelperText-root Mui-error" style="display:none">to address required</p>
              </div>
              <div class="MuiFormControl-root MuiTextField-root MuiFormControl-marginNormal MuiFormControl-fullWidth">
                <label class="MuiFormLabel-root MuiInputLabel-root MuiInputLabel-formControl MuiInputLabel-animated MuiInputLabel-shrink" data-shrink="true">subject</label>
                <div class="MuiInputBase-root MuiInput-root MuiInput-underline MuiInputBase-fullWidth MuiInput-fullWidth MuiInputBase-formControl MuiInput-formControl">
                  <input aria-invalid="false" name="subject" type="text" class="MuiInputBase-input MuiInput-input" value="">
                </div>
                <p class="MuiFormHelperText-root Mui-error" style="display:none">subject required</p>
              </div>
              <div class="MuiFormControl-root MuiTextField-root MuiFormControl-marginNormal MuiFormControl-fullWidth">
                <label class="MuiFormLabel-root MuiInputLabel-root MuiInputLabel-formControl MuiInputLabel-animated MuiInputLabel-shrink" data-shrink="true">message body</label>
                <div class="MuiInputBase-root MuiInput-root MuiInput-underline MuiInputBase-fullWidth MuiInput-fullWidth MuiInputBase-formControl MuiInput-formControl MuiInputBase-multiline MuiInput-multiline">
                  <textarea rows="1" aria-invalid="false" name="body" class="MuiInputBase-input MuiInput-input MuiInputBase-inputMultiline MuiInput-inputMultiline"></textarea>
                </div>
              </div>
              <button class="MuiButtonBase-root MuiButton-root MuiButton-outlined spaced" tabindex="0" type="submit">
                <span class="MuiButton-label">send</span><span class="MuiTouchRipple-root"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.MuiInput-underline').forEach(function(inputRoot) {
      var input = inputRoot.querySelector('input, textarea');
      var formControl = inputRoot.closest('.MuiFormControl-root');
      var label = formControl ? formControl.querySelector('.MuiFormLabel-root') : null;
      var helper = formControl ? formControl.querySelector('.MuiFormHelperText-root') : null;

      if (!input) return;

      input.addEventListener('focus', function() {
        inputRoot.classList.add('Mui-focused');
        if (label) label.classList.add('Mui-focused');
        inputRoot.classList.remove('Mui-error');
        if (label) label.classList.remove('Mui-error');
        if (helper) helper.style.display = 'none';
      });

      input.addEventListener('blur', function() {
        inputRoot.classList.remove('Mui-focused');
        if (label) label.classList.remove('Mui-focused');

        // Validate required fields (to, subject)
        if ((input.name === 'to' || input.name === 'subject') && !input.value.trim()) {
          inputRoot.classList.add('Mui-error');
          if (label) label.classList.add('Mui-error');
          if (helper) helper.style.display = 'block';
        }
      });
    });

    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Message sent (mock)');
    });
  </script>
</body>
</html>
