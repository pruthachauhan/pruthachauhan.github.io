<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <title>sandbox</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="root">
    <div class="jss1">
      <header class="MuiPaper-root MuiAppBar-root MuiAppBar-positionStatic MuiAppBar-colorDefault MuiPaper-elevation4">
        <div class="MuiToolbar-root MuiToolbar-regular MuiToolbar-gutters">
          <button class="MuiButtonBase-root MuiIconButton-root jss3 MuiIconButton-colorInherit" type="button" aria-label="Menu"><span class="MuiIconButton-label"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg></span><span class="MuiTouchRipple-root"></span></button>
          <a class="MuiButtonBase-root MuiButton-root MuiButton-text jss4 MuiButton-colorInherit" href="/"><span class="MuiButton-label"><svg width="111" height="32" viewBox="0 0 111 32" class="d-inline-block align-top" role="img" aria-label="sandbox logo"><rect width="32" height="32" rx="4" fill="#6366f1"/><text x="6" y="23" font-size="18" font-weight="700" fill="#fff" font-family="Roboto, sans-serif">S</text><text x="40" y="22" font-size="16" font-weight="500" fill="rgba(0,0,0,0.87)" font-family="Roboto, sans-serif">sandbox</text></svg></span><span class="MuiTouchRipple-root"></span></a>
          <h6 class="MuiTypography-root jss5 MuiTypography-h6">sandbox</h6>
          <div class="jss2"></div>
          <div class="jss6"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Training: This is a mock feature.')"><span class="MuiButton-label">training</span><span class="MuiTouchRipple-root"></span></button></div>
          <div class="jss7"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Examples: This is a mock feature.')"><span class="MuiButton-label">examples</span><span class="MuiTouchRipple-root"></span></button></div>
          <div class="jss8"><button class="MuiButtonBase-root MuiButton-root MuiButton-text" type="button" onclick="alert('Help: This is a mock feature.')"><span class="MuiButton-label">help</span><span class="MuiTouchRipple-root"></span></button></div>
          <label class="MuiFormControlLabel-root jss9"><span class="MuiSwitch-root"><span class="MuiButtonBase-root MuiIconButton-root jss10 MuiSwitch-switchBase"><span class="MuiIconButton-label"><input class="jss13 MuiSwitch-input" type="checkbox" value=""><span class="MuiSwitch-thumb"></span></span><span class="MuiTouchRipple-root"></span></span><span class="MuiSwitch-track"></span></span><span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1"><svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79-4-4 4-1.79 4-4z"></path></svg></span></label>
        </div>
      </header>
    </div>

    <div class="page-content">
      <div class="MuiGrid-root MuiGrid-container">
        <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
          <h3 class="MuiTypography-root MuiTypography-h3">looping examples</h3>
        </div>

        <!-- Counter -->
        <div class="MuiGrid-root spaced MuiGrid-item MuiGrid-grid-xs-12">
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <h6 class="MuiTypography-root MuiTypography-h6">counter</h6>
          </div>
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <div role="group" class="MuiButtonGroup-root MuiButtonGroup-contained MuiButtonGroup-vertical" aria-label="vertical contained primary button group">
              <button class="MuiButtonBase-root MuiButton-root MuiButton-contained MuiButtonGroup-grouped MuiButtonGroup-groupedVertical MuiButtonGroup-groupedContained MuiButtonGroup-groupedContainedVertical MuiButtonGroup-groupedContainedPrimary MuiButton-containedPrimary" tabindex="0" type="button" onclick="document.getElementById('counter-val').textContent=parseInt(document.getElementById('counter-val').textContent)+1">
                <span class="MuiButton-label">+</span><span class="MuiTouchRipple-root"></span>
              </button>
              <button class="MuiButtonBase-root MuiButton-root MuiButton-contained MuiButtonGroup-grouped MuiButtonGroup-groupedVertical MuiButtonGroup-groupedContained MuiButtonGroup-groupedContainedVertical MuiButtonGroup-groupedContainedPrimary MuiButton-containedPrimary" tabindex="0" type="button" onclick="document.getElementById('counter-val').textContent=parseInt(document.getElementById('counter-val').textContent)-1">
                <span class="MuiButton-label">-</span><span class="MuiTouchRipple-root"></span>
              </button>
            </div>
            <p class="MuiTypography-root MuiTypography-body1">count: <span class="MuiBox-root" id="counter-val">0</span></p>
          </div>
        </div>

        <!-- Random number generator -->
        <div class="MuiGrid-root spaced MuiGrid-item MuiGrid-grid-xs-12">
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <h6 class="MuiTypography-root MuiTypography-h6">random number generator</h6>
          </div>
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <button class="MuiButtonBase-root MuiButton-root MuiButton-contained MuiButton-containedPrimary" tabindex="0" type="button" onclick="document.getElementById('random-val').textContent=Math.floor(Math.random()*100)">
              <span class="MuiButton-label">generate</span><span class="MuiTouchRipple-root"></span>
            </button>
            <p class="MuiTypography-root MuiTypography-body1">random number: <span class="MuiBox-root" id="random-val">0</span></p>
          </div>
        </div>

        <!-- Pagination -->
        <div class="MuiGrid-root spaced MuiGrid-item MuiGrid-grid-xs-12">
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <h6 class="MuiTypography-root MuiTypography-h6">pagination</h6>
          </div>
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <nav aria-label="pagination navigation" class="MuiPagination-root">
              <ul class="MuiPagination-ul" id="pagination">
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary Mui-disabled" tabindex="-1" type="button" disabled="" aria-label="Go to previous page"><svg class="MuiSvgIcon-root MuiPaginationItem-icon" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"></path></svg></button></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary Mui-selected" tabindex="0" type="button" aria-current="true" aria-label="page 1">1<span class="MuiTouchRipple-root"></span></button></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary" tabindex="0" type="button" aria-label="Go to page 2">2<span class="MuiTouchRipple-root"></span></button></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary" tabindex="0" type="button" aria-label="Go to page 3">3<span class="MuiTouchRipple-root"></span></button></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary" tabindex="0" type="button" aria-label="Go to page 4">4<span class="MuiTouchRipple-root"></span></button></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary" tabindex="0" type="button" aria-label="Go to page 5">5<span class="MuiTouchRipple-root"></span></button></li>
                <li><div class="MuiPaginationItem-root MuiPaginationItem-ellipsis">…</div></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary" tabindex="0" type="button" aria-label="Go to page 10">10<span class="MuiTouchRipple-root"></span></button></li>
                <li><button class="MuiButtonBase-root MuiPaginationItem-root MuiPaginationItem-page MuiPaginationItem-textPrimary" tabindex="0" type="button" aria-label="Go to next page"><svg class="MuiSvgIcon-root MuiPaginationItem-icon" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"></path></svg><span class="MuiTouchRipple-root"></span></button></li>
              </ul>
            </nav>
          </div>
        </div>

        <!-- Multiple checkboxes -->
        <div class="MuiGrid-root spaced MuiGrid-item MuiGrid-grid-xs-12">
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <h6 class="MuiTypography-root MuiTypography-h6">multiple checkboxes</h6>
          </div>
          <div class="MuiGrid-root MuiGrid-item MuiGrid-grid-xs-12">
            <fieldset class="MuiFormControl-root">
              <div class="MuiFormGroup-root">
                <label class="MuiFormControlLabel-root">
                  <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiCheckbox-root MuiCheckbox-colorPrimary MuiIconButton-colorPrimary" aria-disabled="false">
                    <span class="MuiIconButton-label">
                      <input class="jss13" type="checkbox" data-indeterminate="false" value="checkbox_1">
                      <svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"></path></svg>
                    </span><span class="MuiTouchRipple-root"></span>
                  </span>
                  <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">checkbox 1</span>
                </label>
                <label class="MuiFormControlLabel-root">
                  <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiCheckbox-root MuiCheckbox-colorPrimary MuiIconButton-colorPrimary" aria-disabled="false">
                    <span class="MuiIconButton-label">
                      <input class="jss13" type="checkbox" data-indeterminate="false" value="checkbox_2">
                      <svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"></path></svg>
                    </span><span class="MuiTouchRipple-root"></span>
                  </span>
                  <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">checkbox 2</span>
                </label>
                <label class="MuiFormControlLabel-root">
                  <span class="MuiButtonBase-root MuiIconButton-root jss10 MuiCheckbox-root MuiCheckbox-colorPrimary MuiIconButton-colorPrimary" aria-disabled="false">
                    <span class="MuiIconButton-label">
                      <input class="jss13" type="checkbox" data-indeterminate="false" value="checkbox_3">
                      <svg class="MuiSvgIcon-root" focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"></path></svg>
                    </span><span class="MuiTouchRipple-root"></span>
                  </span>
                  <span class="MuiTypography-root MuiFormControlLabel-label MuiTypography-body1">checkbox 3</span>
                </label>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Pagination click handler
    document.querySelectorAll('.MuiPaginationItem-page:not(.Mui-disabled)').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.MuiPaginationItem-page').forEach(b => b.classList.remove('Mui-selected'));
        this.classList.add('Mui-selected');
      });
    });
  </script>
</body>
</html>
